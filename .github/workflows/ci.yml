name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-ci:
    name: Format, test, lint, and document
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-ci-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-ci-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Test workspace without default features
        run: cargo test --workspace --no-default-features

      - name: Test workspace with all features
        run: cargo test --workspace --all-features

      - name: Check examples
        run: cargo check --workspace --examples --all-features

      - name: Lint all targets and features
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build documentation
        run: cargo doc --workspace --no-deps --all-features

      - name: Smoke test bypass-db benchmark path
        run: |
          cargo run -p bypass-cli -- bench db \
            --path /tmp/bypass-ci-db \
            --rows-per-batch 8 \
            --batches 2 \
            --scan-iterations 1 \
            --compact \
            --history /tmp/bypass-ci-history.jsonl

      - name: Smoke test native readiness reporting
        run: cargo run -p bypass-cli -- doctor native
